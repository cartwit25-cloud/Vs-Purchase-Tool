<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f8f9fe;
      --primary-purple: #9d85e1;
      --accent-blue: #a2d2ff;
      --text-main: #6e6b7b;
    }
    body {
      background-color: var(--bg-color);
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* 右上角設定齒輪 */
    .settings-btn {
      position: fixed; top: 15px; right: 15px;
      font-size: 20px; color: #ccc; cursor: pointer;
      transition: 0.3s; z-index: 100;
    }
    .settings-btn:hover { color: var(--primary-purple); transform: rotate(90deg); }

    .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: var(--primary-purple); font-weight: bold; }

    .container {
      width: 100%; max-width: 600px; background: white; padding: 30px;
      border-radius: 30px; box-shadow: 0 10px 40px rgba(157, 133, 225, 0.1);
      display: none; animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .header-badge { background: var(--primary-purple); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; display: inline-block; }
    h1 { color: var(--primary-purple); text-align: center; margin: 0 0 15px 0; font-size: 24pt; }

    .dm-container { cursor: zoom-in; margin-bottom: 20px; }
    .dm-image { width: 100%; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

    .note-box { background: #f0ecfb; padding: 15px; border-radius: 15px; border-left: 5px solid var(--primary-purple); font-size: 14px; margin-bottom: 25px; }

    .order-row { display: flex; gap: 10px; margin-bottom: 10px; }
    input { flex: 1; padding: 12px; border: 1px solid #eee; border-radius: 12px; outline: none; }
    input:focus { border-color: var(--primary-purple); }

    .btn-add { background: var(--accent-blue); border: none; width: 40px; height: 40px; border-radius: 12px; color: white; cursor: pointer; display: block; margin: 10px auto; }
    .btn-submit { background: var(--primary-purple); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }

    /* Lightbox */
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; cursor: zoom-out; }
    #overlay img { max-width: 95%; max-height: 95%; }
    #close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
  </style>
</head>
<body>

<div class="settings-btn" onclick="setApiUrl()"><i class="fa-solid fa-gear"></i></div>
<div id="loading" class="loading">Loading..</div>

<div class="container" id="main-content">
  <div style="text-align: center;">
    <div class="header-badge">GROUP PURCHASE 2026</div>
    <h1 id="main-title">載入中...</h1>
  </div>
  
  <div class="dm-container" onclick="openLightbox()">
    <img id="dm-img" class="dm-image" src="" alt="DM">
  </div>
  
  <div class="note-box">
    <strong><i class="fa-solid fa-circle-info"></i> 注意事項：</strong><br>
    <span id="main-note">載入中...</span>
  </div>

  <div id="order-list"></div>
  <button class="btn-add" onclick="addRow()"><i class="fa-solid fa-plus"></i></button>
  <button class="btn-submit" onclick="submitData()">確認送出</button>
</div>

<div id="overlay" onclick="closeLightbox()">
  <span id="close-btn">&times;</span>
  <img id="full-img" src="">
</div>

<script>
  let GAS_URL = localStorage.getItem('gas_api_url');

  window.onload = function() {
    if (!GAS_URL) {
      document.getElementById('loading').innerHTML = "請點擊右上角齒輪 <br> 設定您的 API 網址";
      return;
    }
    fetchData();
  };

  function setApiUrl() {
    const newUrl = prompt("請貼入您的 Google Script Web App 網址：", GAS_URL || "");
    if (newUrl) {
      localStorage.setItem('gas_api_url', newUrl);
      location.reload();
    }
  }

  function fetchData() {
    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        renderPage(data);
      })
      .catch(err => alert("讀取失敗，請檢查網址是否正確且已部署為『所有人』存取。"));
  }

  function renderPage(data) {
    document.getElementById('main-title').innerText = data.title;
    document.getElementById('main-note').innerText = data.note;
    document.getElementById('dm-img').src = data.imgUrl;
    document.getElementById('full-img').src = data.imgUrl;
    const list = document.getElementById('order-list');
    data.orders.forEach(order => addRow(order[0], order[1]));
    while (list.getElementsByClassName('order-row').length < 5) addRow();
  }

  function addRow(name = '', item = '') {
    const div = document.createElement('div');
    div.className = 'order-row';
    div.innerHTML = `<input type="text" class="name-input" placeholder="姓名" value="${name}"><input type="text" class="item-input" placeholder="品名" value="${item}">`;
    document.getElementById('order-list').appendChild(div);
  }

  function submitData() {
    const dataToSave = Array.from(document.getElementsByClassName('order-row'))
      .map(row => [row.querySelector('.name-input').value.trim(), row.querySelector('.item-input').value.trim()])
      .filter(r => r[0] || r[1]);

    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ data: dataToSave }) })
      .then(() => { alert("填寫完成"); location.reload(); })
      .catch(() => alert("儲存失敗"));
  }

  function openLightbox() { document.getElementById('overlay').style.display = 'flex'; }
  function closeLightbox() { document.getElementById('overlay').style.display = 'none'; }
</script>
</body>
</html>
