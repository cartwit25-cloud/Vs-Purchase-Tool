<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Quicksand:wght@700&display=swap');

    :root {
      --bg-color: #f8f9fe;
      --primary-purple: #9d85e1;
      --accent-blue: #a2d2ff;
      --accent-red: #ffb7b2;
      --text-main: #6e6b7b;
      --btn-overlay-blue: rgba(162, 210, 255, 0.15); /* 更淡的藍色疊加 */
      --btn-overlay-red: rgba(255, 183, 178, 0.15); /* 更淡的紅色疊加 */
    }

    body {
      background-color: var(--bg-color);
      font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
      margin: 0; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
    }

    .settings-btn {
      position: fixed; top: 15px; right: 15px;
      font-size: 20px; color: #ccc; cursor: pointer;
      transition: 0.3s; z-index: 100;
    }
    .settings-btn:hover { color: var(--primary-purple); transform: rotate(90deg); }

    .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; color: var(--primary-purple); font-weight: bold; }

    .container {
      width: 100%; max-width: 600px; background: white; padding: 30px;
      border-radius: 30px; box-shadow: 0 10px 40px rgba(157, 133, 225, 0.1);
      display: none; animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 標題框優化 */
    .title-badge-container {
      background: var(--primary-purple);
      padding: 12px 25px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(157, 133, 225, 0.3);
    }
    h1 { 
      color: white; 
      text-align: center; 
      margin: 0; 
      font-size: 26pt; 
      font-family: 'Quicksand', 'Noto Sans TC', sans-serif;
      letter-spacing: 1px;
    }

    /* 圖片尺寸縮小 */
    .dm-container { cursor: zoom-in; margin: 0 auto 20px auto; width: 85%; }
    .dm-image { width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

    .note-box { background: #f0ecfb; padding: 15px; border-radius: 15px; border-left: 5px solid var(--primary-purple); font-size: 14px; margin-bottom: 25px; text-align: left; }
    .note-box strong { font-weight: 700; color: #4b4b4b; }

    /* 表單列與按鈕設計 (復刻圖片版) */
    .order-row { 
      display: flex; 
      gap: 15px; 
      margin-bottom: 12px; 
      align-items: center; 
    }
    
    .input-wrapper {
      position: relative;
      flex: 1;
    }

    input { 
      width: 100%;
      padding: 12px 15px; 
      border: 1px solid #eee; 
      border-radius: 12px; 
      outline: none; 
      font-size: 14px;
      box-sizing: border-box; /* 極重要：確保 padding 不會撐破容器 */
    }
    input:focus { border-color: var(--primary-purple); background: #fafaff; }

    /* 內部按鈕樣式 */
    .btn-action-overlay {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: 0.2s;
      z-index: 10;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .btn-action-overlay:hover { opacity: 1; transform: scale(1.1) translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    .btn-action-overlay:active { transform: scale(0.95) translateY(0); box-shadow: none; }

    /* ＋ 按鈕：疊加在姓名輸入框左下角 */
    .btn-add-row { 
      background: var(--btn-overlay-blue);
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #7ab8f0; /* 調整＋的顏色 */
    }
    .input-wrapper-name input {
      padding-left: 50px; /* 為按鈕留出空間 */
    }

    /* － 按鈕：疊加在品名輸入框右下角 */
    .btn-del-row { 
      background: var(--btn-overlay-red);
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #f7a09c; /* 調整－的顏色 */
    }
    .input-wrapper-item input {
      padding-right: 50px; /* 為按鈕留出空間 */
    }

    .btn-submit { 
      background: var(--primary-purple); 
      color: white; 
      border: none; 
      padding: 18px; 
      width: 100%; 
      border-radius: 20px; 
      font-size: 18px; 
      font-weight: bold; 
      cursor: pointer; 
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(157, 133, 225, 0.3);
      transition: 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-submit:active { transform: translateY(1px); box-shadow: none; }

    /* Lightbox */
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; cursor: zoom-out; }
    #overlay img { max-width: 95%; max-height: 95%; border-radius: 10px; }
    #close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
  </style>
</head>
<body>

<div class="settings-btn" onclick="setApiUrl()"><i class="fa-solid fa-gear"></i></div>
<div id="loading" class="loading">Loading..</div>

<div class="container" id="main-content">
  <div style="text-align: center;">
    <div class="title-badge-container">
      <h1 id="main-title">Loading</h1>
    </div>
  </div>
  
  <div class="dm-container" onclick="openLightbox()">
    <img id="dm-img" class="dm-image" src="" alt="DM">
  </div>
  
  <div class="note-box">
    <strong><i class="fa-solid fa-circle-info"></i> 注意事項：</strong><br>
    <span id="main-note">載入中...</span>
  </div>

  <div id="order-list"></div>
  <button class="btn-submit" onclick="submitData()">確認送出</button>
</div>

<div id="overlay" onclick="closeLightbox()">
  <span id="close-btn">&times;</span>
  <img id="full-img" src="">
</div>

<script>
  let GAS_URL = localStorage.getItem('gas_api_url');

  window.onload = function() {
    if (!GAS_URL) {
      document.getElementById('loading').innerHTML = "請點擊右上角齒輪 <br> 設定您的 API 網址";
      return;
    }
    fetchData();
  };

  function setApiUrl() {
    const newUrl = prompt("請貼入您的 Google Script Web App 網址：", GAS_URL || "");
    if (newUrl) {
      localStorage.setItem('gas_api_url', newUrl);
      location.reload();
    }
  }

  function fetchData() {
    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        renderPage(data);
      })
      .catch(err => alert("讀取失敗，請確認 API 網址設定"));
  }

  function renderPage(data) {
    document.getElementById('main-title').innerText = data.title;
    document.getElementById('main-note').innerText = data.note;
    document.getElementById('dm-img').src = data.imgUrl;
    document.getElementById('full-img').src = data.imgUrl;
    
    const list = document.getElementById('order-list');
    if (data.orders && data.orders.length > 0) {
      data.orders.forEach(order => addRow(order[0], order[1]));
    }
    
    // 預設補滿 5 行
    while (list.getElementsByClassName('order-row').length < 5) addRow();
  }

  function addRow(name = '', item = '') {
    const list = document.getElementById('order-list');
    const div = document.createElement('div');
    div.className = 'order-row';
    div.innerHTML = `
      <div class="input-wrapper input-wrapper-name">
        <button class="btn-action-overlay btn-add-row" onclick="addRow()" title="新增一行"><i class="fa-solid fa-plus"></i></button>
        <input type="text" class="name-input" placeholder="姓名" value="${name}">
      </div>
      <div class="input-wrapper input-wrapper-item">
        <input type="text" class="item-input" placeholder="品名" value="${item}">
        <button class="btn-action-overlay btn-del-row" onclick="removeRow(this)" title="刪除此行"><i class="fa-solid fa-minus"></i></button>
      </div>
    `;
    list.appendChild(div);
  }

  function removeRow(btn) {
    const row = btn.closest('.order-row');
    const name = row.querySelector('.name-input').value.trim();
    const item = row.querySelector('.item-input').value.trim();
    
    // 如果是空欄位直接刪除，如果有內容則跳出確認
    if (!name && !item) {
      row.remove();
    } else {
      if (confirm(`確定要刪除這筆資料嗎？\n姓名: ${name}\n品名: ${item}`)) row.remove();
    }
  }

  function submitData() {
    const dataToSave = Array.from(document.getElementsByClassName('order-row'))
      .map(row => [row.querySelector('.name-input').value.trim(), row.querySelector('.item-input').value.trim()])
      .filter(r => r[0] || r[1]);

    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ data: dataToSave }) })
      .then(() => { alert("填寫完成"); location.reload(); })
      .catch(() => alert("儲存失敗"));
  }

  function openLightbox() { document.getElementById('overlay').style.display = 'flex'; }
  function closeLightbox() { document.getElementById('overlay').style.display = 'none'; }
</script>
</body>
</html>
