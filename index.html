<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color: #fff9f0;
      --primary-color: #ffb7b2; /* 嫩粉紅 */
      --secondary-color: #b2e2f2; /* 天藍 */
      --accent-color: #fff1a8; /* 奶油黃 */
      --text-color: #5d5d5d;
    }
    body {
      background-color: var(--bg-color);
      font-family: 'Microsoft JhengHei', sans-serif;
      color: var(--text-color);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
      background: white;
      padding: 20px;
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 4px solid var(--accent-color);
    }
    h1 {
      color: #ff8b94;
      text-align: center;
      margin-bottom: 10px;
      font-size: 24pt;
    }
    .dm-image {
      width: 100%;
      border-radius: 15px;
      margin: 15px 0;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
      display: block;
    }
    .note-box {
      background: var(--secondary-color);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 11pt;
      line-height: 1.5;
    }
    .order-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    input {
      flex: 1;
      padding: 10px;
      border: 2px solid #eee;
      border-radius: 10px;
      outline: none;
      transition: 0.3s;
    }
    input:focus { border-color: var(--primary-color); }
    .btn-add {
      background: #b2f2bb;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      color: #2b5e35;
      margin-top: 10px;
    }
    .btn-submit {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
      box-shadow: 0 5px 0 #ff9aa2;
    }
    .btn-submit:active { transform: translateY(3px); box-shadow: none; }
    .loading { text-align: center; font-size: 18px; color: #aaa; margin-top: 50px; }
  </style>
</head>
<body>

<div id="loading" class="loading">正在載入繽紛表單...</div>

<div class="container" id="main-content" style="display:none;">
  <h1 id="main-title">載入中...</h1>
  
  <img id="dm-img" class="dm-image" src="" alt="團購DM">
  
  <div class="note-box">
    <i class="fa-solid fa-bell"></i> <strong>注意事項：</strong><br>
    <span id="main-note">載入中...</span>
  </div>

  <div id="order-list">
    </div>

  <button class="btn-add" onclick="addRow()"><i class="fa-solid fa-plus"></i></button>
  <button class="btn-submit" onclick="submitData()">送出訂單</button>
</div>

<script>
  // 初始化載入
  window.onload = function() {
    google.script.run.withSuccessHandler(showData).getData();
  };

  function showData(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    
    document.getElementById('main-title').innerText = data.title;
    document.getElementById('main-note').innerText = data.note;
    document.getElementById('dm-img').src = data.imgUrl;

    const list = document.getElementById('order-list');
    const existingOrders = data.orders;

    // 先填入現有資料
    existingOrders.forEach(order => {
      addRow(order[0], order[1]);
    });

    // 補足至少 5 行
    const currentRows = list.getElementsByClassName('order-row').length;
    for (let i = currentRows; i < 5; i++) {
      addRow();
    }
  }

  function addRow(name = '', item = '') {
    const div = document.createElement('div');
    div.className = 'order-row';
    div.innerHTML = `
      <input type="text" class="name-input" placeholder="姓名" value="${name}">
      <input type="text" class="item-input" placeholder="品名" value="${item}">
    `;
    document.getElementById('order-list').appendChild(div);
  }

  function submitData() {
    const rows = document.getElementsByClassName('order-row');
    const dataToSave = [];
    
    for (let row of rows) {
      const name = row.querySelector('.name-input').value.trim();
      const item = row.querySelector('.item-input').value.trim();
      if (name || item) {
        dataToSave.push([name, item]);
      }
    }

    google.script.run.withSuccessHandler(res => {
      alert(res);
      location.reload(); // 重新載入以顯示更新後的結果
    }).saveAllOrders(dataToSave);
  }
</script>
</body>
</html>
